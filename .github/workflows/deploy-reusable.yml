name: Reusable Deployment Pipeline

on:
  workflow_call:
    inputs:
      environment:
        description: 'Deployment environment'
        required: false
        default: 'staging'
        type: string
      docker-registry:
        description: 'Docker registry'
        required: false
        default: 'docker.io'
        type: string
      backend-image:
        description: 'Backend image name'
        required: false
        default: 'saas-foodtech-backend'
        type: string
      frontend-image:
        description: 'Frontend image name'
        required: false
        default: 'saas-foodtech-frontend'
        type: string

env:
  REGISTRY: ${{ inputs.docker-registry }}
  BACKEND_IMAGE: ${{ inputs.backend-image }}
  FRONTEND_IMAGE: ${{ inputs.frontend-image }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    environment: ${{ inputs.environment }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}.{{minor}}.{{patch}}
          flavor: |
            latest=true

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Production
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT || 22 }}
          script: |
            # Set deployment variables
            export VERSION=${{ steps.meta.outputs.version }}
            export BACKEND_IMAGE=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:$VERSION
            export FRONTEND_IMAGE=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:$VERSION
            export GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            
            echo "Deploying version $VERSION to ${{ inputs.environment }}"
            
            # Create deployment directory if it doesn't exist
            mkdir -p /opt/saas-foodtech
            cd /opt/saas-foodtech
            
            # Download latest docker-compose if not exists
            if [ ! -f "docker-compose.prod.yml" ]; then
              echo "Downloading production docker-compose file..."
              curl -o docker-compose.prod.yml https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.prod.yml
            fi
            
            # Update images in docker-compose.prod.yml
            sed -i "s|yourusername/saas-foodtech-backend:latest|$BACKEND_IMAGE|g" docker-compose.prod.yml
            sed -i "s|yourusername/saas-foodtech-frontend:latest|$FRONTEND_IMAGE|g" docker-compose.prod.yml
            
            # Create/update .env file for production
            cat > .env << 'EOF'
APP_NAME="FoodTech SAAS Platform"
APP_ENV=production
APP_KEY=${{ secrets.APP_KEY }}
JWT_SECRET=${{ secrets.JWT_SECRET }}
APP_DEBUG=false
APP_TIMEZONE=UTC
APP_URL=${{ secrets.APP_URL }}
FRONTEND_URL=${{ secrets.FRONTEND_URL }}
DB_CONNECTION=mysql
DB_HOST=mysql
DB_PORT=3306
DB_DATABASE=otex_platform
DB_USERNAME=${{ secrets.DB_USERNAME }}
DB_PASSWORD=${{ secrets.DB_PASSWORD }}
SESSION_DRIVER=database
SESSION_LIFETIME=120
AUTH_API_DRIVER=sanctum
BROADCAST_CONNECTION=reverb
FILESYSTEM_DISK=local
QUEUE_CONNECTION=redis
CACHE_DRIVER=redis
CACHE_PREFIX=foodtech_
REDIS_HOST=redis
REDIS_PORT=6379
MAIL_MAILER=smtp
MAIL_HOST=${{ secrets.MAIL_HOST }}
MAIL_PORT=${{ secrets.MAIL_PORT }}
MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
MAIL_ENCRYPTION=${{ secrets.MAIL_ENCRYPTION }}
MAIL_FROM_ADDRESS="${{ secrets.MAIL_FROM_ADDRESS }}"
MAIL_FROM_NAME="${APP_NAME}"
REVERB_APP_ID=${{ secrets.REVERB_APP_ID }}
REVERB_APP_KEY=${{ secrets.REVERB_APP_KEY }}
REVERB_APP_SECRET=${{ secrets.REVERB_APP_SECRET }}
REVERB_HOST=reverb
REVERB_PORT=8080
REVERB_SCHEME=http
GEMINI_API_KEY=$GEMINI_API_KEY
GEMINI_MODEL=gemini-1.5-flash
GEMINI_REQUEST_TIMEOUT=30
GEMINI_MAX_TOKENS=500
GEMINI_TEMPERATURE=0.7
EOF
            
            # Pull latest images
            echo "Pulling Docker images..."
            docker-compose -f docker-compose.prod.yml pull
            
            # Stop existing containers
            echo "Stopping existing containers..."
            docker-compose -f docker-compose.prod.yml down
            
            # Start new containers
            echo "Starting new containers..."
            docker-compose -f docker-compose.prod.yml up -d
            
            # Wait for services to be healthy
            echo "Waiting for services to be healthy..."
            sleep 30
            
            # Run database migrations
            echo "Running database migrations..."
            docker-compose -f docker-compose.prod.yml exec -T backend php artisan migrate --force
            
            # Clear caches
            echo "Clearing application caches..."
            docker-compose -f docker-compose.prod.yml exec -T backend php artisan config:cache
            docker-compose -f docker-compose.prod.yml exec -T backend php artisan route:cache
            docker-compose -f docker-compose.prod.yml exec -T backend php artisan view:cache
            
            # Cleanup old images
            echo "Cleaning up old Docker images..."
            docker image prune -f
            
            echo "Deployment completed successfully!"
            echo "Application should be available at: ${{ secrets.APP_URL }}"

      - name: Health Check
        run: |
          echo "Running health checks..."
          sleep 60
          
          # Check backend health
          BACKEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.APP_URL }}/health || echo "000")
          
          # Check frontend health
          FRONTEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.FRONTEND_URL }} || echo "000")
          
          echo "Backend Status: $BACKEND_STATUS"
          echo "Frontend Status: $FRONTEND_STATUS"
          
          if [ "$BACKEND_STATUS" = "200" ] && [ "$FRONTEND_STATUS" = "200" ]; then
            echo "All services are healthy!"
          else
            echo "Health check failed!"
            exit 1
          fi

      - name: Notify Deployment Status
        if: always()
        run: |
          echo "## Deployment Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Environment: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "Version: ${{ steps.meta.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "### Deployment Successful! " >> $GITHUB_STEP_SUMMARY
            echo "Application is now live at: ${{ secrets.APP_URL }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Deployment Failed!" >> $GITHUB_STEP_SUMMARY
            echo "Please check the logs for details." >> $GITHUB_STEP_SUMMARY
          fi
