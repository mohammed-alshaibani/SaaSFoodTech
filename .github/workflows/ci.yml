name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  MYSQL_ROOT_PASSWORD: password
  MYSQL_DATABASE: test_saas_foodtech

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ env.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ env.MYSQL_DATABASE }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
          --character-set-server=utf8mb4
          --collation-server=utf8mb4_unicode_ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql, dom, filter, gd, curl, zip, bcmath, json
          coverage: xdebug

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Copy environment file
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cp .env.example .env
          sed -i 's/DB_HOST=mysql/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_PASSWORD=/DB_PASSWORD=password/' .env
          sed -i 's/DB_DATABASE=saas_foodtech/DB_DATABASE=test_saas_foodtech/' .env
          echo "GEMINI_API_KEY=$GEMINI_API_KEY" >> .env

      - name: Install dependencies
        run: composer install --no-progress --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate Application Key
        run: php artisan key:generate --force

      - name: Set up Laravel Environment
        run: |
          php artisan config:cache
          php artisan migrate --force --seed
          php artisan storage:link

      - name: Execute Tests
        run: |
          vendor/bin/phpunit --coverage-clover=coverage.xml --log-junit=test-results.xml

      - name: Upload Test Results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: backend
          name: backend-coverage

  frontend-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint

      - name: Run Tests
        working-directory: ./frontend
        run: npm test -- --coverage --watchAll=false

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      - name: Upload Build Results
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: frontend/.next/
          retention-days: 1

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-progress --no-interaction --prefer-dist

      - name: Run PHP CodeSniffer
        run: |
          vendor/bin/phpcs --standard=PSR12 --report=summary app/ --report-file=phpcs-report.json

      - name: Run PHP Stan
        run: |
          vendor/bin/phpstan analyse --error-format=github --no-progress app/

      - name: Run Laravel Pint
        run: |
          vendor/bin/pint --test --verbose

      - name: Upload Code Quality Results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: code-quality-results
          path: |
            phpcs-report.json

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install dependencies
        run: composer install --no-progress --no-interaction --prefer-dist

      - name: Run Security Audit
        run: |
          composer audit --no-dev
          echo "Checking for security vulnerabilities in dependencies..."

      - name: Run Frontend Security Audit
        working-directory: ./frontend
        run: |
          npm audit --audit-level=high
          echo "Checking frontend dependencies for vulnerabilities..."

  docker-build-test:
    runs-on: ubuntu-latest
    needs: [ backend-tests, frontend-tests, code-quality ]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: saas-foodtech-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: saas-foodtech-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  summary:
    runs-on: ubuntu-latest
    if: always()
    needs: [ backend-tests, frontend-tests, code-quality, security-scan ]
    
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts/

      - name: Test Summary
        run: |
          echo "## 🧪 Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|---------|" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "artifacts/test-results.xml" ]; then
            echo "| Backend Tests | ✅ Passed | PHPUnit executed successfully |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Backend Tests | ❌ Failed | Check test logs |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f "artifacts/frontend-build" ]; then
            echo "| Frontend Build | ✅ Passed | Next.js build successful |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Frontend Build | ❌ Failed | Check build logs |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f "artifacts/code-quality-results/phpcs-report.json" ]; then
            echo "| Code Quality | ✅ Passed | PSR-12 standards met |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Code Quality | ⚠️ Warnings | Check code quality reports |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 Ready for Deployment" >> $GITHUB_STEP_SUMMARY
