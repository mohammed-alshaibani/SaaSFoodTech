# CI/CD Pipeline for SaaSFoodTech

name: Main CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    name: Backend Tests (Laravel)
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_sqlite, dom, filter, gd, curl, zip, bcmath, json
          coverage: none

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: composer install --no-progress --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare Environment
        working-directory: ./backend
        run: |
          cp .env.example .env
          php artisan key:generate
          # Use SQLite for reliable CI tests
          touch database/database.sqlite
          sed -i 's/DB_CONNECTION=mysql/DB_CONNECTION=sqlite/' .env
          sed -i 's/DB_DATABASE=otex_platform/DB_DATABASE=database\/database.sqlite/' .env

      - name: Run Migrations
        working-directory: ./backend
        run: php artisan migrate --force

      - name: Run Tests
        working-directory: ./backend
        run: php artisan test

  frontend-build:
    name: Frontend Build & Lint (Next.js)
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build
