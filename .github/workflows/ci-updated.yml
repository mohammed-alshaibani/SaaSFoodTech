name: CI Pipeline

on:
  push:
    branches: [ main, test ]
  pull_request:
    branches: [ main ]

env:
  MYSQL_ROOT_PASSWORD: password
  MYSQL_DATABASE: otex_platform

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ env.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ env.MYSQL_DATABASE }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
          --character-set-server=utf8mb4
          --collation-server=utf8mb4_unicode_ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql, dom, filter, gd, curl, zip, bcmath, json
          coverage: xdebug

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Copy environment file
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cp backend/.env.example backend/.env
          sed -i 's/DB_HOST=mysql/DB_HOST=127.0.0.1/' backend/.env
          sed -i 's/DB_PASSWORD=/DB_PASSWORD=password/' backend/.env
          sed -i 's/DB_DATABASE=otex_platform/DB_DATABASE=saas_foodtech/' backend/.env
          echo "GEMINI_API_KEY=$GEMINI_API_KEY" >> backend/.env

      - name: Install dependencies
        run: |
          cd backend
          composer install --no-progress --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate Application Key
        run: |
          cd backend
          php artisan key:generate --force

      - name: Set up Laravel Environment
        run: |
          cd backend
          php artisan config:cache
          php artisan migrate --force --seed
          php artisan storage:link

      - name: Execute Tests
        run: |
          cd backend
          vendor/bin/phpunit --coverage-clover=coverage.xml --log-junit=test-results.xml

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            backend/test-results.xml
            backend/coverage.xml
          retention-days: 30

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage

  frontend-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint

      - name: Run tests
        run: |
          cd frontend
          npm run test

      - name: Build application
        run: |
          cd frontend
          npm run build

      - name: Upload Build Results
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/.next/
          retention-days: 7

  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql, dom, filter, gd, curl, zip, bcmath, json

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: |
          cd backend
          composer install --no-progress --no-interaction --prefer-dist --optimize-autoloader

      - name: Run PHP CodeSniffer
        run: |
          cd backend
          vendor/bin/phpcs --standard=PSR12 app/

      - name: Run PHPStan
        run: |
          cd backend
          vendor/bin/phpstan analyse --memory-limit=2G

      - name: Run Laravel Pint
        run: |
          cd backend
          vendor/bin/pint --test --verbose

      - name: Upload Code Quality Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: code-quality-results
          path: |
            backend/storage/logs/lint.log
            backend/storage/logs/pint.log
          retention-days: 30

  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Upload Security Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-results
          path: trivy-results.sarif
          retention-days: 30

  quality-gates:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, code-quality, security-scan]
    if: always()

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Check Quality Gates
        run: |
          echo "## Quality Gates Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check backend tests
          if [ "${{ needs.backend-tests.result }}" == "success" ]; then
            echo "### Backend Tests:  PASS" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Backend Tests:  FAIL" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          
          # Check frontend tests
          if [ "${{ needs.frontend-tests.result }}" == "success" ]; then
            echo "### Frontend Tests: PASS" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Frontend Tests: FAIL" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          
          # Check code quality
          if [ "${{ needs.code-quality.result }}" == "success" ]; then
            echo "### Code Quality:  PASS" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Code Quality:  FAIL" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          
          # Check security scan
          if [ "${{ needs.security-scan.result }}" == "success" ]; then
            echo "### Security Scan:  PASS" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Security Scan:  FAIL" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### All Quality Gates Passed! Ready for deployment." >> $GITHUB_STEP_SUMMARY
