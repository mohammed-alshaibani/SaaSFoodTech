<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otex API Documentation</title>
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/swagger-ui-dist@5.32.1/swagger-ui.css">
    <style>
        html {
            box-sizing: border-box;
            overflow: -moz-scrollbars-vertical;
            overflow-y: scroll;
        }
        *, *:before, *:after {
            box-sizing: inherit;
        }
        body {
            margin:0;
            background: #fafafa;
        }
        .swagger-ui .topbar {
            background-color: #667eea;
        }
        .swagger-ui .topbar .download-url-wrapper .download-url-button {
            background-color: #764ba2;
        }
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            margin: 20px;
            border-radius: 5px;
            border: 1px solid #f5c6cb;
        }
        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 20px;
            margin: 20px;
            border-radius: 5px;
            border: 1px solid #c3e6cb;
        }
    </style>
</head>
<body>
    <div id="swagger-ui"></div>

    <script src="https://unpkg.com/swagger-ui-dist@5.32.1/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5.32.1/swagger-ui-standalone-preset.js"></script>
    <script>
        window.onload = function() {
            // Try multiple URLs for the API documentation
            const possibleUrls = [
                '/api/docs/api-docs.yaml',
                '/docs/api-docs.yaml',
                '/api/docs/api-docs.json',
                '/docs/api-docs.json'
            ];
            
            let currentUrlIndex = 0;
            
            function tryLoadSwagger(url) {
                console.log('Trying to load Swagger UI with URL:', url);
                
                const ui = SwaggerUIBundle({
                    url: url,
                    dom_id: '#swagger-ui',
                    deepLinking: true,
                    presets: [
                        SwaggerUIBundle.presets.apis,
                        SwaggerUIStandalonePreset
                    ],
                    plugins: [
                        SwaggerUIBundle.plugins.DownloadUrl
                    ],
                    layout: "StandaloneLayout",
                    validatorUrl: null,
                    docExpansion: "list",
                    operationsSorter: "alpha",
                    tagsSorter: "alpha",
                    supportedSubmitMethods: ['get', 'post', 'put', 'delete', 'patch'],
                    onComplete: function() {
                        console.log("Swagger UI loaded successfully with URL:", url);
                        showSuccessMessage("API documentation loaded successfully!");
                    },
                    onError: function(error) {
                        console.error("Error loading Swagger UI with URL:", url, error);
                        
                        // Try next URL
                        currentUrlIndex++;
                        if (currentUrlIndex < possibleUrls.length) {
                            console.log("Trying next URL...");
                            document.getElementById('swagger-ui').innerHTML = '';
                            tryLoadSwagger(possibleUrls[currentUrlIndex]);
                        } else {
                            showErrorMessage("Failed to load API documentation from all possible URLs. Please check if the server is running and the documentation file exists.");
                        }
                    },
                    requestInterceptor: function(request) {
                        // Add any request interceptors here
                        return request;
                    },
                    responseInterceptor: function(response) {
                        // Add any response interceptors here
                        return response;
                    }
                });

                window.ui = ui;
            }
            
            function showErrorMessage(message) {
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-message';
                errorDiv.innerHTML = `
                    <h3>Error Loading API Documentation</h3>
                    <p>${message}</p>
                    <p><strong>Tried URLs:</strong></p>
                    <ul>
                        ${possibleUrls.map(url => `<li><code>${url}</code></li>`).join('')}
                    </ul>
                    <p><strong>Troubleshooting:</strong></p>
                    <ul>
                        <li>Ensure the Laravel server is running: <code>php artisan serve</code></li>
                        <li>Check if the YAML file exists: <code>storage/api-docs/api-docs.yaml</code></li>
                        <li>Clear route cache: <code>php artisan route:clear</code></li>
                        <li>Check the documentation route: <code>php artisan route:list | grep docs</code></li>
                    </ul>
                `;
                document.getElementById('swagger-ui').appendChild(errorDiv);
            }
            
            function showSuccessMessage(message) {
                const successDiv = document.createElement('div');
                successDiv.className = 'success-message';
                successDiv.innerHTML = `<h3>Success!</h3><p>${message}</p>`;
                document.body.insertBefore(successDiv, document.body.firstChild);
                
                // Auto-hide after 3 seconds
                setTimeout(() => {
                    successDiv.style.display = 'none';
                }, 3000);
            }
            
            // Start trying URLs
            tryLoadSwagger(possibleUrls[currentUrlIndex]);
        }
    </script>
</body>
</html>
