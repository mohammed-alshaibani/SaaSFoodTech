services:
  # Laravel Backend Application
  backend:
    image: yourusername/saas-foodtech-backend:latest
    container_name: saasfoodtech_backend_prod
    restart: always
    working_dir: /var/www/html
    volumes:
      - backend_storage:/var/www/html/storage
      - backend_logs:/var/log
    networks:
      - saasfoodtech_network
    depends_on:
      - mysql
      - redis
    environment:
      - APP_NAME=FoodTech SAAS
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=${APP_URL:-https://yourdomain.com}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=saas_foodtech
      - DB_USERNAME=${DB_USERNAME:-saas_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - BROADCAST_CONNECTION=reverb
      - CACHE_DRIVER=redis
      - FILESYSTEM_DISK=local
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
      - SESSION_LIFETIME=120
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_PORT=6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - LOG_CHANNEL=stack
      - MAIL_MAILER=smtp
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION:-tls}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS}
      - MAIL_FROM_NAME="${APP_NAME}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Laravel Reverb WebSocket Server
  reverb:
    image: yourusername/saas-foodtech-backend:latest
    container_name: saasfoodtech_reverb_prod
    restart: always
    working_dir: /var/www/html
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    volumes:
      - backend_storage:/var/www/html/storage
    networks:
      - saasfoodtech_network
    depends_on:
      - redis
    environment:
      - APP_NAME=FoodTech SAAS
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=saas_foodtech
      - DB_USERNAME=${DB_USERNAME:-saas_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - BROADCAST_CONNECTION=reverb
      - REVERB_APP_ID=${REVERB_APP_ID:-foodtech-app}
      - REVERB_APP_KEY=${REVERB_APP_KEY}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET}
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=8080
      - REVERB_SCHEME=https
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_PORT=6379
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: saasfoodtech_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
      - ssl_certs:/etc/ssl/certs:ro
    networks:
      - saasfoodtech_network
    depends_on:
      - backend
    environment:
      - NGINX_HOST=${NGINX_HOST:-yourdomain.com}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: saasfoodtech_mysql_prod
    restart: always
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=saas_foodtech
      - MYSQL_USER=${DB_USERNAME:-saas_user}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - mysql_logs:/var/log/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/my.cnf:ro
    networks:
      - saasfoodtech_network
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Redis Cache and Queue
  redis:
    image: redis:7-alpine
    container_name: saasfoodtech_redis_prod
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - redis_logs:/var/log/redis
    networks:
      - saasfoodtech_network
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mysql_data:
    driver: local
  mysql_logs:
    driver: local
  backend_storage:
    driver: local
  backend_logs:
    driver: local
  redis_data:
    driver: local
  redis_logs:
    driver: local
  nginx_logs:
    driver: local
  ssl_certs:
    driver: local

networks:
  saasfoodtech_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
