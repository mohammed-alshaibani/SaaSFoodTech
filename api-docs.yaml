openapi: 3.0.3
info:
  title: Otex Service Platform API
  description: A comprehensive service request platform connecting customers with service providers
  version: 1.0.0
  contact:
    name: API Support
    email: support@otex.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8000/api
    description: Development Server
  - url: https://api.otex.com/api
    description: Production Server

security:
  - bearerAuth: []

tags:
  - name: Authentication
    description: User authentication and authorization endpoints
  - name: Service Requests
    description: Service request management endpoints
  - name: File Attachments
    description: File upload and download endpoints
  - name: Monitoring
    description: System monitoring and health check endpoints

paths:
  /register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: Create a new user account and return authentication token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
                - password_confirmation
              properties:
                name:
                  type: string
                  example: John Doe
                email:
                  type: string
                  format: email
                  example: john@example.com
                password:
                  type: string
                  format: password
                  example: Password123!
                password_confirmation:
                  type: string
                  format: password
                  example: Password123!
                role:
                  type: string
                  enum: [customer, provider]
                  example: customer
                phone:
                  type: string
                  example: +1234567890
                company_name:
                  type: string
                  example: John's Services
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  access_token:
                    type: string
                    example: 1|abc123...
                  token_type:
                    type: string
                    example: Bearer
                  user:
                    $ref: '#/components/schemas/User'
                  request_id:
                    type: string
                    example: req_1234567890
                  timestamp:
                    type: string
                    format: date-time
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: object
                  request_id:
                    type: string
                  timestamp:
                    type: string
                    format: date-time

  /login:
    post:
      tags:
        - Authentication
      summary: Login user
      description: Authenticate user and return JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: john@example.com
                password:
                  type: string
                  format: password
                  example: Password123!
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  access_token:
                    type: string
                    example: 1|abc123...
                  token_type:
                    type: string
                    example: Bearer
                  user:
                    $ref: '#/components/schemas/User'
                  request_id:
                    type: string
                    example: req_1234567890
                  timestamp:
                    type: string
                    format: date-time
        '422':
          description: Invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: object
                  request_id:
                    type: string
                  timestamp:
                    type: string
                    format: date-time

  /me:
    get:
      tags:
        - Authentication
      summary: Get current user
      description: Get the authenticated user's profile information
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/User'
                  request_id:
                    type: string
                    example: req_1234567890
                  timestamp:
                    type: string
                    format: date-time
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: Unauthorized
                  request_id:
                    type: string
                  timestamp:
                    type: string
                    format: date-time

  /logout:
    post:
      tags:
        - Authentication
      summary: Logout user
      description: Logout the authenticated user and revoke current token
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Logged out successfully
                  request_id:
                    type: string
                    example: req_1234567890
                  timestamp:
                    type: string
                    format: date-time
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: Unauthorized
                  request_id:
                    type: string
                  timestamp:
                    type: string
                    format: date-time

  /requests:
    get:
      tags:
        - Service Requests
      summary: List service requests
      description: Get a list of service requests with optional filtering
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          description: Filter by status
          required: false
          schema:
            type: string
            enum: [pending, accepted, completed]
        - name: category
          in: query
          description: Filter by category
          required: false
          schema:
            type: string
        - name: search
          in: query
          description: Search in title and description
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Service requests retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ServiceRequest'
                  meta:
                    type: object
                    properties:
                      current_page:
                        type: integer
                        example: 1
                      per_page:
                        type: integer
                        example: 15
                      total:
                        type: integer
                        example: 50
                  request_id:
                    type: string
                    example: req_1234567890
                  timestamp:
                    type: string
                    format: date-time
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: Unauthorized
                  request_id:
                    type: string
                  timestamp:
                    type: string
                    format: date-time

    post:
      tags:
        - Service Requests
      summary: Create service request
      description: Create a new service request
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - description
                - latitude
                - longitude
              properties:
                title:
                  type: string
                  example: Fix my kitchen sink
                description:
                  type: string
                  example: The kitchen sink is leaking and needs professional repair
                latitude:
                  type: number
                  format: float
                  example: 40.7128
                longitude:
                  type: number
                  format: float
                  example: -74.0060
                category:
                  type: string
                  example: plumbing
                urgency:
                  type: string
                  enum: [low, normal, high, urgent]
                  example: normal
                budget_min:
                  type: number
                  format: float
                  example: 100.00
                budget_max:
                  type: number
                  format: float
                  example: 500.00
      responses:
        '201':
          description: Service request created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/ServiceRequest'
                  request_id:
                    type: string
                    example: req_1234567890
                  timestamp:
                    type: string
                    format: date-time
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: object
                  request_id:
                    type: string
                  timestamp:
                    type: string
                    format: date-time

  /monitoring/health:
    get:
      tags:
        - Monitoring
      summary: Health check
      description: Check the health status of the API and its dependencies
      responses:
        '200':
          description: System health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: healthy
                      timestamp:
                        type: string
                        format: date-time
                      services:
                        type: object
                        properties:
                          database:
                            type: string
                            example: connected
                          cache:
                            type: string
                            example: connected
                          queue:
                            type: string
                            example: running
                  request_id:
                    type: string
                    example: req_1234567890
                  timestamp:
                    type: string
                    format: date-time

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: John Doe
        email:
          type: string
          format: email
          example: john@example.com
        plan:
          type: string
          enum: [free, basic, premium, enterprise]
          example: free
        phone:
          type: string
          example: +1234567890
        company_name:
          type: string
          example: John's Services
        created_at:
          type: string
          format: date-time
          example: 2023-12-01T10:00:00Z
        updated_at:
          type: string
          format: date-time
          example: 2023-12-01T10:00:00Z
        roles:
          type: array
          items:
            type: string
          example: ["customer"]
        permissions:
          type: array
          items:
            type: string
          example: ["create-service-request", "view-own-requests"]

    ServiceRequest:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Fix my kitchen sink
        description:
          type: string
          example: The kitchen sink is leaking and needs professional repair
        status:
          type: string
          enum: [pending, accepted, completed, cancelled]
          example: pending
        category:
          type: string
          example: plumbing
        urgency:
          type: string
          enum: [low, normal, high, urgent]
          example: normal
        latitude:
          type: number
          format: float
          example: 40.7128
        longitude:
          type: number
          format: float
          example: -74.0060
        budget_min:
          type: number
          format: float
          example: 100.00
        budget_max:
          type: number
          format: float
          example: 500.00
        customer:
          $ref: '#/components/schemas/User'
        provider:
          $ref: '#/components/schemas/User'
        created_at:
          type: string
          format: date-time
          example: 2023-12-01T10:00:00Z
        updated_at:
          type: string
          format: date-time
          example: 2023-12-01T10:00:00Z

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT authentication token obtained from login endpoint
