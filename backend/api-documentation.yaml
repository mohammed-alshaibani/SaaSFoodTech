openapi: 3.0.3
info:
  title: Otex Service Platform API
  description: A comprehensive service request platform connecting customers with service providers
  version: 1.0.0
  contact:
    name: API Support
    email: support@otex.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8000/api
    description: Development Server
  - url: https://api.otex.com/api
    description: Production Server

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from authentication endpoints

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "John Doe"
        email:
          type: string
          format: email
          example: "john@example.com"
        plan:
          type: string
          enum: [free, basic, premium, enterprise]
          example: "free"
        phone:
          type: string
          example: "+1234567890"
        company_name:
          type: string
          example: "John's Services"
        roles:
          type: array
          items:
            type: string
          example: ["customer"]
        permissions:
          type: array
          items:
            type: string
          example: ["create-service-request"]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ServiceRequest:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: "Fix my kitchen sink"
        description:
          type: string
          example: "The kitchen sink is leaking and needs professional repair. Water is dripping from the faucet."
        status:
          type: string
          enum: [pending, accepted, completed]
          example: "pending"
        latitude:
          type: number
          format: float
          example: 40.7128
        longitude:
          type: number
          format: float
          example: -74.0060
        customer:
          $ref: '#/components/schemas/User'
        provider:
          $ref: '#/components/schemas/User'
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/Attachment'
        metadata:
          type: object
          properties:
            category:
              type: string
              example: "plumbing"
            urgency:
              type: string
              enum: [low, normal, high, urgent]
              example: "normal"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Attachment:
      type: object
      properties:
        id:
          type: integer
          example: 1
        filename:
          type: string
          example: "kitchen_sink_20231201_123456.jpg"
        original_filename:
          type: string
          example: "kitchen_sink.jpg"
        file_path:
          type: string
          example: "attachments/2023/12/01/kitchen_sink_20231201_123456.jpg"
        file_type:
          type: string
          enum: [image, document]
          example: "image"
        file_size:
          type: integer
          example: 1048576
        mime_type:
          type: string
          example: "image/jpeg"
        download_url:
          type: string
          example: "http://localhost:8000/api/attachments/1/download"
        created_at:
          type: string
          format: date-time

    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          oneOf:
            - $ref: '#/components/schemas/User'
            - $ref: '#/components/schemas/ServiceRequest'
            - type: array
              items:
                oneOf:
                  - $ref: '#/components/schemas/User'
                  - $ref: '#/components/schemas/ServiceRequest'
        message:
          type: string
          example: "Operation completed successfully"
        request_id:
          type: string
          example: "req_1234567890"
        timestamp:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              example: "VALIDATION_ERROR"
            message:
              type: string
              example: "The given data was invalid"
            details:
              type: object
              example:
                email: ["The email field is required."]
        request_id:
          type: string
          example: "req_1234567890"
        timestamp:
          type: string
          format: date-time

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "john@example.com"
        password:
          type: string
          format: password
          example: "Password123!"

    RegisterRequest:
      type: object
      required:
        - name
        - email
        - password
        - password_confirmation
        - role
      properties:
        name:
          type: string
          example: "John Doe"
        email:
          type: string
          format: email
          example: "john@example.com"
        password:
          type: string
          format: password
          example: "Password123!"
        password_confirmation:
          type: string
          format: password
          example: "Password123!"
        role:
          type: string
          enum: [customer, provider]
          example: "customer"
        phone:
          type: string
          example: "+1234567890"
        company_name:
          type: string
          example: "John's Services"

    CreateServiceRequest:
      type: object
      required:
        - title
        - description
        - latitude
        - longitude
      properties:
        title:
          type: string
          example: "Fix my kitchen sink"
        description:
          type: string
          example: "The kitchen sink is leaking and needs professional repair."
        latitude:
          type: number
          format: float
          example: 40.7128
        longitude:
          type: number
          format: float
          example: -74.0060
        category:
          type: string
          example: "plumbing"
        urgency:
          type: string
          enum: [low, normal, high, urgent]
          example: "normal"
        enhance_with_ai:
          type: boolean
          example: false

    AcceptServiceRequest:
      type: object
      properties:
        provider_notes:
          type: string
          example: "I can fix this within 2 hours. I have 10 years of plumbing experience."
        estimated_completion:
          type: string
          format: date
          example: "2023-12-02"

    CompleteServiceRequest:
      type: object
      properties:
        completion_notes:
          type: string
          example: "Successfully replaced the faucet and fixed the leak. All connections are secure."
        final_attachments:
          type: array
          items:
            type: integer
          example: [1, 2]
        rating:
          type: integer
          minimum: 1
          maximum: 5
          example: 5

paths:
  /register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: Create a new user account and return authentication token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      access_token:
                        type: string
                        example: "1|abc123..."
                      token_type:
                        type: string
                        example: "Bearer"
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /login:
    post:
      tags:
        - Authentication
      summary: Authenticate user
      description: Login user and return authentication token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      access_token:
                        type: string
                        example: "1|abc123..."
                      token_type:
                        type: string
                        example: "Bearer"
        '422':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /me:
    get:
      tags:
        - Authentication
      summary: Get current user
      description: Get authenticated user's profile information
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /logout:
    post:
      tags:
        - Authentication
      summary: Logout user
      description: Revoke current authentication token
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /requests:
    get:
      tags:
        - Service Requests
      summary: List service requests
      description: Get list of service requests based on user role and permissions
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, accepted, completed]
        - name: category
          in: query
          schema:
            type: string
        - name: latitude
          in: query
          schema:
            type: number
        - name: longitude
          in: query
          schema:
            type: number
        - name: radius
          in: query
          schema:
            type: number
            default: 50
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 15
      responses:
        '200':
          description: Service requests retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Service Requests
      summary: Create service request
      description: Create a new service request (customers only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServiceRequest'
      responses:
        '201':
          description: Service request created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '403':
          description: Forbidden (not a customer or plan limit exceeded)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /requests/{id}:
    get:
      tags:
        - Service Requests
      summary: Get service request
      description: Get details of a specific service request
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Service request retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '404':
          description: Service request not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /requests/{id}/accept:
    patch:
      tags:
        - Service Requests
      summary: Accept service request
      description: Accept a pending service request (providers only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptServiceRequest'
      responses:
        '200':
          description: Service request accepted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '403':
          description: Access denied or invalid status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Service request not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /requests/{id}/complete:
    patch:
      tags:
        - Service Requests
      summary: Complete service request
      description: Mark an accepted service request as completed (assigned provider only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteServiceRequest'
      responses:
        '200':
          description: Service request completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '403':
          description: Access denied or invalid status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Service request not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /attachments/upload:
    post:
      tags:
        - Attachments
      summary: Upload file
      description: Upload a file attachment for a service request
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - service_request_id
              properties:
                file:
                  type: string
                  format: binary
                  description: File to upload (max 10MB, allowed types: jpg, png, gif, webp, pdf, doc, docx, txt)
                service_request_id:
                  type: integer
                  example: 1
      responses:
        '201':
          description: File uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /attachments/{id}/download:
    get:
      tags:
        - Attachments
      summary: Download file
      description: Download a file attachment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: File download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Attachment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /attachments/{id}:
    delete:
      tags:
        - Attachments
      summary: Delete file
      description: Delete a file attachment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: File deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '404':
          description: Attachment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ai/enhance:
    post:
      tags:
        - AI Services
      summary: Enhance description
      description: Enhance service request description using AI
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - description
              properties:
                title:
                  type: string
                  example: "Fix my kitchen sink"
                description:
                  type: string
                  example: "The sink is broken"
      responses:
        '200':
          description: Description enhanced successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

tags:
  - name: Authentication
    description: User authentication and authorization endpoints
  - name: Service Requests
    description: Service request management endpoints
  - name: Attachments
    description: File attachment management endpoints
  - name: AI Services
    description: AI-powered service enhancement endpoints
