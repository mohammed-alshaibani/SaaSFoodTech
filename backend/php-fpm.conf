; PHP-FPM global configuration
; Overrides the base image default to fix permission errors when the master
; process runs as root but workers drop to www.

[global]
; Write FPM master process logs to /dev/stderr (accessible by root master)
error_log = /dev/stderr

; Keep the master process in the foreground (supervisord manages it)
daemonize = no

; Include the default pool configuration shipped with the base image
include=/usr/local/etc/php-fpm.d/*.conf
